name: mcp_probe
description: >-
  Conformance checks and a test harness for Model Context Protocol (MCP)
  servers. Runs any MCP server over stdio and asserts on its behavior from
  package:test. Built on dart_mcp.
version: 0.3.3

executables:
  mcp_probe:
repository: https://github.com/Yusufihsangorgel/mcp_probe
topics:
  - mcp
  - testing
  - ai
  - server
  - conformance

screenshots:
  - description: >-
      The harness starts your MCP server as a subprocess, drives it over stdio w
      ith JSON-RPC, and turns each rule's reply into one finding in a Conformanc
      eReport.
    path: doc/architecture.png

environment:
  sdk: ^3.8.0

dependencies:
  dart_mcp: ^0.5.2
  json_rpc_2: ">=3.0.3 <5.0.0"
  test: ^1.25.6

dev_dependencies:
  lints: ^6.0.0
